{%extends 'projet/base.html' %}

{% block content %}

        <div class ="produit">
            <h3>{{ produit.nom }}</h3>
            <p>{{ produit.description }}</p>
            <img src="{{produit.image_principale.url}}"
                 alt="{{ produit.nom }}"
                 width="300" height="300">


            {% for variante in produit.variantes.all %}
            <p> Prix: {{ variante.prix }} CHF</p>
            <form method="post" action="{% url 'ajouter_au_panier' variante.id  %}">
                {% csrf_token %}
                <button type="submit">Ajouter au panier</button>
            </form>
                
            {% endfor %}

        </div>


{% endblock %}
